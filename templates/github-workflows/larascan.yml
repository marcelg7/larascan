# Larascan — runs the larascan scanner on every pull request
# and posts the findings as a comment.
#
# Setup:
#   1. Copy this file to .github/workflows/larascan.yml in your repo.
#   2. Vendor the scanner into your repo (see INSTALL options below), OR
#      check out the scanner from your own private mirror / gist.
#   3. Commit and open a PR — findings appear as a bot comment within ~1 minute.
#
# INSTALL options for the scanner in CI:
#   A. Drop scripts/audit.php and scripts/render.php into .larascan/ in your repo.
#   B. Or point to a private gist / internal repo with those two files.
#
# This workflow expects the scanner at `.larascan/scripts/audit.php`.

name: Larascan

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.php'
      - '**.blade.php'
      - 'composer.json'
      - 'composer.lock'
      - '.env.example'
      - 'config/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Run Larascan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Run larascan
        id: audit
        run: |
          php .larascan/scripts/audit.php "$GITHUB_WORKSPACE" > /tmp/audit.json
          SCORE=$(jq -r '.meta.score' /tmp/audit.json)
          GRADE=$(jq -r '.meta.grade' /tmp/audit.json)
          COUNT=$(jq -r '.meta.finding_count' /tmp/audit.json)
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Build PR comment
        id: comment
        run: |
          {
            echo 'body<<EOF'
            echo "## Larascan — ${{ steps.audit.outputs.score }}/100 (${{ steps.audit.outputs.grade }})"
            echo ""
            echo "**${{ steps.audit.outputs.count }} findings** across $(jq -r '.meta.stats.files_scanned' /tmp/audit.json) files."
            echo ""
            echo "### Top priority"
            jq -r '.findings | map(select(.severity == "critical" or .severity == "high")) | .[0:5] | map("- **\(.severity | ascii_upcase)** `\(.rule_id)` \(.title) — `\(.file)\(if .line then ":\(.line)" else "" end)`") | .[]' /tmp/audit.json
            echo ""
            echo "### Summary by severity"
            echo "| Severity | Count |"
            echo "|---|---:|"
            for sev in critical high medium low; do
              n=$(jq -r --arg s "$sev" '[.findings[] | select(.severity == $s)] | length' /tmp/audit.json)
              echo "| $sev | $n |"
            done
            echo ""
            echo "<sub>Generated by larascan v0.3 · [buy the skill](https://mjgapp.com/products/larascan)</sub>"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: larascan
          message: ${{ steps.comment.outputs.body }}

      - name: Fail on critical findings
        if: ${{ steps.audit.outputs.grade == 'F' }}
        run: |
          echo "Larascan grade is F — blocking merge. Run \`php .larascan/scripts/audit.php . --fix\` locally to address safe fixes."
          exit 1
